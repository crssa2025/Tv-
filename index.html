<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بث عبدالله زيدان | PURE 4K TESTER</title>
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>

    <style>
        :root { --pink: #ff007f; --neon: #00d2ff; }
        body, html { margin: 0; padding: 0; background: #01060b; color: white; font-family: 'Segoe UI', sans-serif; }
        
        .header { padding: 15px; background: rgba(255,0,127,0.1); border-bottom: 2px solid var(--pink); text-align: center; }
        .header b { font-size: 20px; text-shadow: 0 0 10px var(--pink); }

        .container { width: 95%; max-width: 1000px; margin: 15px auto; }
        .v-box { border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 0 30px rgba(255, 0, 127, 0.2); }
        .video-js { width: 100%; aspect-ratio: 16/9; }

        /* أزرار تجربة القنوات */
        .id-tester { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0; justify-content: center; }
        .test-btn { 
            background: #222; border: 1px solid #444; color: #fff; 
            padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 11px; 
        }
        .test-btn.active { background: var(--pink); border-color: var(--pink); font-weight: bold; }

        .flex-info { display: flex; flex-direction: row; gap: 10px; margin-top: 15px; }
        .card { flex: 1; background: rgba(255,255,255,0.03); border-radius: 12px; padding: 12px; height: 320px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; }
        .card-title { font-size: 13px; color: var(--pink); border-bottom: 1px solid #333; margin-bottom: 10px; text-align: center; font-weight: bold; }

        .view-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 11px; }
        .view-count { color: var(--neon); font-weight: bold; }

        .total-box { margin-top: auto; padding-top: 10px; border-top: 1px solid var(--pink); text-align: center; }
        .total-num { font-size: 18px; font-weight: 900; }

        @media (max-width: 600px) { .flex-info { flex-direction: column; } }
    </style>
</head>
<body>

    <header class="header">
        <b>BEIN SPORTS 1 PURE 4K ⚽</b>
        <div style="font-size: 10px; color: #aaa; margin-top:5px;">جرب الأزرار أدناه لتشغيل القناة الصحيحة</div>
    </header>

    <div class="container">
        <div class="v-box">
            <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto"></video>
        </div>

        <div class="id-tester">
            <span style="width: 100%; text-align: center; font-size: 10px; color: var(--neon);">اختر السيرفر لتجربة القنوات:</span>
            <button class="test-btn" onclick="tryID(332188, this)">القناة 1</button>
            <button class="test-btn" onclick="tryID(332578, this)">القناة 2</button>
            <button class="test-btn" onclick="tryID(527418, this)">القناة 3</button>
            <button class="test-btn" onclick="tryID(594040, this)">القناة 4</button>
            <button class="test-btn" onclick="tryID(194432, this)">القناة 5</button>
            <button class="test-btn" onclick="tryID(332189, this)">القناة 6</button>
        </div>

        <div class="flex-info">
            <div class="card">
                <div class="card-title">معلومات البث</div>
                <div style="font-size: 11px; line-height: 2;">
                    <div>الباقة: BEIN SPORTS PURE 4K</div>
                    <div>القناة الحالية: <span id="current-id" style="color:var(--neon)">332188</span></div>
                    <div>الحالة: <span style="color:#0f0">فحص السيرفر...</span></div>
                </div>
                <div class="total-box"><small style="color:var(--pink)">مباراة العراق وبوليفيا</small></div>
            </div>

            <div class="card">
                <div class="card-title">مشاهدات المحافظات 🇮🇶</div>
                <div id="v-list" style="flex:1; overflow-y:auto;"></div>
                <div class="total-box">
                    <span class="total-num" id="total-v">0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        var player = videojs('my-video', { autoplay: true, fluid: true });

        // وظيفة تجربة القنوات
        function tryID(id, btn) {
            let url = `http://nvpro.tv:80/live/ali1979/1979ali/${id}.m3u8`;
            player.src({ type: 'application/x-mpegURL', src: url });
            player.play();
            
            document.querySelectorAll('.test-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            document.getElementById('current-id').innerText = id;
        }

        // تشغيل أول رقم تلقائياً
        tryID(332188, document.querySelector('.test-btn'));

        // نظام المشاهدات
        const cities = ["بغداد", "البصرة", "أربيل", "النجف", "كربلاء", "نينوى", "بابل", "ذي قار", "كركوك", "ميسان"];
        function refresh() {
            let base = 265 + (Math.random() * 80);
            document.getElementById('total-v').innerText = base.toFixed(3) + " ألف";
            let html = "";
            cities.forEach(c => {
                html += `<div class="view-row"><span>${c}</span><span class="view-count">${(base * (Math.random() * 0.1)).toFixed(3)}</span></div>`;
            });
            document.getElementById('v-list').innerHTML = html;
        }
        setInterval(refresh, 3000); refresh();
    </script>
</body>
</html>
