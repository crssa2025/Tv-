<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث عبود - المشغل الرسمي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #0b0e11;
            color: #ffffff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* هيدر باسم عبود */
        .header {
            width: 100%;
            padding: 15px 0;
            background: #161b22;
            text-align: center;
            border-bottom: 2px solid #30363d;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #58a6ff;
        }

        .container {
            width: 95%;
            max-width: 900px;
            margin-top: 25px;
        }

        /* حاوية المشغل */
        .video-box {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #30363d;
        }

        /* مشغل جوجل كروم الافتراضي */
        video {
            width: 100%;
            display: block;
            outline: none;
        }

        /* شريط المعلومات */
        .info-panel {
            background: #161b22;
            padding: 15px;
            border-radius: 0 0 12px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .live-indicator {
            color: #ff4500;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: #ff4500;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        .viewers {
            font-size: 1.1rem;
            color: #c9d1d9;
        }

        #count {
            color: #3fb950;
            font-weight: bold;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .footer-text {
            margin-top: 20px;
            color: #8b949e;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>بث عبود LIVE 🇮🇶</h1>
</div>

<div class="container">
    <div class="video-box">
        <video id="my-video" controls autoplay playsinline>
            <source src="http://xcmin32.acmst.it.com/live/594040_.m3u8?session=OgpDfT7ks71D7hGDb2IqBStrT9--XPCwFsIuT9lXMrvh3ILIpkxZlbxuPto9ZRJXnVcEl4OHZWUiFhVwoWw6d0NNU-EN7yCE&location=local" type="application/x-mpegURL">
            متصفحك لا يدعم مشغل الفيديو الافتراضي.
        </video>
    </div>

    <div class="info-panel">
        <div class="live-indicator">
            <div class="live-dot"></div>
            مباشر الآن
        </div>
        <div class="viewers">
            <i class="fa-solid fa-eye"></i> المشاهدون: <span id="count">220,500</span>
        </div>
    </div>

    <div style="margin-top: 15px; text-align: right;">
        <h3 style="margin: 5px 0;">مباراة العراق ضد بوليفيا</h3>
        <p style="color: #8b949e; font-size: 0.9rem;">بث مباشر بجودة عالية - تقديم عبود</p>
    </div>
</div>

<div class="footer-text">
    جميع الحقوق محفوظة للمطور عبود &copy; 2026
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    var video = document.getElementById('my-video');
    var videoSrc = 'http://xcmin32.acmst.it.com/live/594040_.m3u8?session=OgpDfT7ks71D7hGDb2IqBStrT9--XPCwFsIuT9lXMrvh3ILIpkxZlbxuPto9ZRJXnVcEl4OHZWUiFhVwoWw6d0NNU-EN7yCE&location=local';

    if (Hls.isSupported()) {
        var hls = new Hls();
        hls.loadSource(videoSrc);
        hls.attachMedia(video);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoSrc;
    }

    // عداد المشاهدين الوهمي (200k - 250k)
    function randomViewers() {
        let current = parseInt(document.getElementById('count').innerText.replace(/,/g, ''));
        let change = Math.floor(Math.random() * 800) - 300; 
        let newVal = current + change;

        if (newVal < 200000) newVal = 210000;
        if (newVal > 250000) newVal = 245000;

        document.getElementById('count').innerText = newVal.toLocaleString();
    }

    setInterval(randomViewers, 3000);
</script>

</body>
</html>
