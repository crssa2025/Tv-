<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث عبود الرسمي | أسود الرافدين</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --main-red: #ff004c;
            --glass: rgba(255, 255, 255, 0.1);
            --bg: #08080a;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 0, 76, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 210, 255, 0.1) 0px, transparent 50%);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* الهيدر الجديد */
        .header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .brand span { color: var(--main-red); }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 15px;
        }

        /* المشغل الاحترافي */
        .video-container {
            position: relative;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.9);
            border: 1px solid var(--glass);
        }

        video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
            cursor: pointer;
        }

        /* شريط المعلومات المتحرك */
        .stats-overlay {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.9));
        }

        .live-tag {
            background: var(--main-red);
            padding: 5px 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: blink 1.5s infinite;
        }

        .viewers-count {
            background: rgba(255,255,255,0.08);
            padding: 8px 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            border: 1px solid var(--glass);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .viewers-count i { color: #00ff88; }

        /* تفاصيل المباراة */
        .match-details {
            margin-top: 30px;
            background: var(--glass);
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass);
        }

        .team-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .vs {
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--main-red);
        }

        @keyframes blink {
            50% { opacity: 0.6; }
        }

        @media (max-width: 600px) {
            .brand { font-size: 1.2rem; }
            .match-details h2 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="brand">عبود <span>LIVE</span> <i class="fa-solid fa-bolt"></i></div>
    <div class="viewers-count">
        <i class="fa-solid fa-users"></i>
        <span id="fake-count">220,145</span>
    </div>
</header>

<div class="container">
    <div class="video-container">
        <video id="video" controls autoplay playsinline poster="https://p0.pxfuel.com/preview/44/104/187/stadium-football-arena-pitch.jpg"></video>
        
        <div class="stats-overlay">
            <div class="live-tag">
                <i class="fa-solid fa-circle"></i> مباشر الآن
            </div>
            <div style="font-size: 0.9rem; color: #ccc;">سيرفر 1 - فائق السرعة ⚡</div>
        </div>
    </div>

    <div class="match-details">
        <div class="team-box">
            <span style="font-size: 1.5rem;">🇮🇶 العراق</span>
            <span class="vs">VS</span>
            <span style="font-size: 1.5rem;">بوليفيا 🇧🇴</span>
        </div>
        <p style="text-align: center; color: #aaa; margin: 0;">
            بث مباشر بجودة عالية وبدون تقطيع - مباراة ودية دولية
        </p>
    </div>

    <p style="text-align: center; margin-top: 20px; font-size: 0.8rem; color: #555;">
        تمت البرمجة بواسطة عبود لضمان أفضل تجربة مشاهدة 2026
    </p>
</div>

<script>
    var video = document.getElementById('video');
    var videoSrc = 'http://xcmin32.acmst.it.com/live/594040_.m3u8?session=OgpDfT7ks71D7hGDb2IqBStrT9--XPCwFsIuT9lXMrvh3ILIpkxZlbxuPto9ZRJXnVcEl4OHZWUiFhVwoWw6d0NNU-EN7yCE&location=local';

    // التأكد من دعم المتصفح لـ HLS
    if (Hls.isSupported()) {
        var hls = new Hls();
        hls.loadSource(videoSrc);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play();
        });
    } 
    // دعم متصفحات Safari و iOS التي تدعم HLS برمجياً بدون مكتبة
    else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoSrc;
        video.addEventListener('loadedmetadata', function() {
            video.play();
        });
    }

    // عداد عبود الذكي (200k - 250k)
    function updateCounter() {
        const countElement = document.getElementById('fake-count');
        let current = parseInt(countElement.innerText.replace(/,/g, ''));
        
        // تغيير عشوائي واقعي
        let change = Math.floor(Math.random() * 600) - 250;
        let next = current + change;

        if (next < 200000) next += 2000;
        if (next > 250000) next -= 2000;

        countElement.innerText = next.toLocaleString();
    }

    setInterval(updateCounter, 2500);
</script>

</body>
</html>
