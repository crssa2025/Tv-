<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث مباشر للمباريات</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        .navbar {
            background-color: #1e293b;
            border-bottom: 2px solid #38bdf8;
        }
        .video-container {
            max-width: 900px;
            margin: 40px auto;
            background: #1e293b;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .video-js {
            width: 100%;
            height: 500px;
            border-radius: 10px;
        }
        .status-badge {
            background: #ef4444;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <span style="color: #38bdf8;">LIVE</span> SPORTS
            </a>
            <span class="status-badge">بث مباشر الآن</span>
        </div>
    </nav>

    <div class="container">
        <div class="video-container">
            <h3 class="mb-4 text-center">مشاهدة المباراة بجودة عالية</h3>
            
            <video id="my-video" class="video-js vjs-big-play-centered vjs-theme-city" controls preload="auto" data-setup='{}'>
                <source src="http://wjk30.tutor3.site/live/906544_.m3u8?session=Fsfuteq0yrUbEy-g_gNALVHW06VoIZ4TkpWPhrWff6ULy1a48_1H9OJMRQShLLbipEe2pb2bIZR3cr8V5G7GlxUT9URC7or1&location=local" type="application/x-mpegURL">
                <p class="vjs-no-js">
                    للمشاهدة، يرجى تفعيل جافا سكريبت وتحديث المتصفح.
                </p>
            </video>

            <div class="mt-4 p-3 border-top border-secondary">
                <h5>تفاصيل البث:</h5>
                <p class="text-secondary small">إذا توقف البث، قم بتحديث الصفحة. هذا المشغل يدعم تقنية HLS لضمان استقرار الإشارة.</p>
            </div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
