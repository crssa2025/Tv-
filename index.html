<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البث المباشر | العراق ضد بوليفيا</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            padding: 20px;
            background: linear-gradient(145deg, #1a1a1a, #000);
            text-align: center;
            border-bottom: 2px solid #00ff00;
            box-shadow: 0 4px 15px rgba(0, 255, 0, 0.2);
        }

        .live-indicator {
            background-color: red;
            padding: 5px 12px;
            border-radius: 5px;
            font-weight: bold;
            animation: blink 1s infinite;
            display: inline-block;
            margin-bottom: 10px;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .container {
            width: 95%;
            max-width: 900px;
            margin-top: 20px;
        }

        /* تنسيق مشغل الفيديو */
        .video-container {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .video-js {
            width: 100%;
            height: 500px;
        }

        /* عداد المشاهدات */
        .stats-bar {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 0 0 12px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #333;
        }

        .viewers-count {
            color: #00ff00;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .match-info {
            font-size: 1.1rem;
        }

        @media (max-width: 600px) {
            .video-js { height: 250px; }
            .stats-bar { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="live-indicator">مباشر LIVE</div>
        <h1 style="margin: 5px 0;">🇮🇶 العراق vs بوليفيا 🇧🇴</h1>
        <p>تصفيات دولية ودية - 1 أبريل 2026</p>
    </div>

    <div class="container">
        <div class="video-container">
            <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" data-setup='{}'>
                <source src="http://xcmin32.acmst.it.com/live/194432_.m3u8?session=zWETTd-UxKdl8D44xQw0olB0XWYO9T7IrXiRdl9wh4okv4Ayy7j5rVSCR3vpBdd6QJ8E42Po_Cu36C90dBZK-Um36TVPvTiD&location=local" type="application/x-mpegURL">
            </video>
        </div>

        <div class="stats-bar">
            <div class="match-info">جودة البث: <span style="color: #00bfff;">1080p FHD</span></div>
            <div class="viewers-count">
                👁️ <span id="count">220,123</span> مشاهد الآن
            </div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>

    <script>
        // دالة لتحديث عداد المشاهدات بشكل وهمي وديناميكي
        function updateViewers() {
            const countElement = document.getElementById('count');
            
            // تحديد المدى بين 200,000 و 250,000
            let min = 200000;
            let max = 250000;
            
            // توليد رقم عشوائي ضمن النطاق
            let currentCount = Math.floor(Math.random() * (max - min + 1)) + min;
            
            // إضافة الفواصل الرقمية للجمالية (مثل 220,123)
            countElement.innerText = currentCount.toLocaleString('en-US');
        }

        // تحديث الرقم كل 5 ثواني لإعطاء حركة للموقع
        setInterval(updateViewers, 5000);

        // تشغيل الدالة فور تحميل الصفحة
        updateViewers();
    </script>
</body>
</html>
