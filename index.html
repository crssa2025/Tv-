<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>بث عبود الرسمي | حصرياً</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* واجهة عبود الاحترافية */
        .header-bar {
            width: 100%;
            background: linear-gradient(90deg, #1a1a1a, #000);
            padding: 15px 0;
            text-align: center;
            border-bottom: 3px solid #ff004c;
            box-shadow: 0 5px 15px rgba(255, 0, 76, 0.3);
        }

        .header-bar h1 {
            margin: 0;
            font-size: 1.8rem;
            color: #fff;
            text-transform: uppercase;
        }

        .header-bar span { color: #ff004c; }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 20px auto;
            padding: 0 10px;
        }

        /* حاوية المشغل الذكية */
        #player {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid #333;
            background: #111;
        }

        /* شريط العداد المباشر */
        .live-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111;
            padding: 15px;
            border-radius: 0 0 15px 15px;
            border: 1px solid #333;
            margin-top: -5px;
        }

        .live-btn {
            background: #ff0000;
            padding: 5px 12px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9rem;
            animation: flash 1.5s infinite;
        }

        .viewer-box {
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #viewer-count {
            color: #00ff88;
            font-weight: bold;
        }

        @keyframes flash {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .match-card {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="header-bar">
    <h1>عبود <span>LIVE</span></h1>
</div>

<div class="container">
    <div id="player"></div>

    <div class="live-info">
        <div class="live-btn">LIVE مباشر</div>
        <div class="viewer-box">
            <i class="fa-solid fa-eye"></i>
            <span id="viewer-count">220,412</span>
        </div>
    </div>

    <div class="match-card">
        <h2 style="margin: 0; color: #ff004c;">🇮🇶 العراق ضد بوليفيا 🇧🇴</h2>
        <p style="color: #aaa; margin: 10px 0 0 0;">بتاريخ: 01-04-2026 | جودة 4K تلقائية</p>
    </div>
</div>

<script type="text/javascript">
    // إعدادات المشغل العالمي (حل لجميع المشاكل)
    var player = new Clappr.Player({
        source: 'http://xcmin32.acmst.it.com/live/194432_.m3u8?session=zWETTd-UxKdl8D44xQw0olB0XWYO9T7IrXiRdl9wh4okv4Ayy7j5rVSCR3vpBdd6QJ8E42Po_Cu36C90dBZK-Um36TVPvTiD&location=local',
        parentId: "#player",
        width: '100%',
        height: '100%',
        autoPlay: true,
        preload: 'auto',
        mimeType: 'application/x-mpegURL',
        mediacontrol: {seekbar: "#ff004c", buttons: "#ff004c"},
        hlsjsConfig: {
            enableWorker: true,
            lowLatencyMode: true,
        },
        // كود تشغيل تلقائي للهواتف
        events: {
            onReady: function() {
                this.core.mediaControl.container.play();
            }
        }
    });

    // عداد المشاهدين الوهمي الذكي (عبود)
    function startCounter() {
        const display = document.getElementById('viewer-count');
        let viewers = 220412;

        setInterval(() => {
            // حركة عشوائية طبيعية
            let move = Math.floor(Math.random() * 400) - 150;
            viewers += move;

            // الحصر في النطاق المطلوب
            if (viewers < 200000) viewers += 5000;
            if (viewers > 250000) viewers -= 5000;

            display.innerText = viewers.toLocaleString();
        }, 3000);
    }

    startCounter();
</script>

<p style="color: #444; font-size: 0.7rem; margin-top: 20px;">Powered by Abood 2026</p>

</body>
</html>
