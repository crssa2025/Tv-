<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عبود لايف - بث مباشر</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-neon: #00f2ff;
            --secondary-neon: #7000ff;
            --dark-bg: #05070a;
            --glass-card: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--dark-bg);
            background: radial-gradient(circle at top, #10141d 0%, #05070a 100%);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0; padding-bottom: 40px;
        }

        /* الهيدر */
        .header-abood {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 2px solid var(--primary-neon);
            padding: 12px 0;
            backdrop-filter: blur(15px);
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.1);
        }
        .logo-text {
            font-size: 1.6rem; font-weight: 900;
            background: linear-gradient(45deg, #fff, var(--primary-neon));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* عداد المشاهدات المطور */
        .live-counter {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff003c;
            color: #ff003c;
            padding: 4px 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex; align-items: center; gap: 8px;
        }
        #v-num { color: #fff; }

        /* لوحة المباراة - سطر واحد مرتب */
        .match-display {
            background: var(--glass-card);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 15px 25px;
            margin: 25px 0;
            display: flex; align-items: center; justify-content: center;
            gap: 20px;
        }
        .t-side { display: flex; align-items: center; gap: 12px; flex: 1; }
        .t-right { justify-content: flex-end; }
        .t-left { justify-content: flex-start; }

        .t-img {
            width: 50px; height: 50px;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.2));
        }
        .t-name { font-size: 1.1rem; font-weight: 700; margin: 0; white-space: nowrap; }
        .vs-neon {
            font-size: 1.4rem; font-weight: 900;
            color: var(--primary-neon);
            text-shadow: 0 0 10px var(--primary-neon);
        }

        /* المشغل */
        .player-wrap {
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            background: #000;
        }
        .video-js { width: 100%; height: 480px; }

        /* أزرار الجودة */
        .q-btns-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px; margin-top: 20px;
        }
        .q-button {
            background: #11151c;
            border: 1px solid #222;
            color: #aaa; padding: 12px; border-radius: 12px;
            font-weight: bold; transition: 0.3s; font-size: 0.9rem;
        }
        .q-button:hover, .q-button.active {
            background: linear-gradient(45deg, var(--secondary-neon), var(--primary-neon));
            color: #fff; border-color: transparent;
            box-shadow: 0 5px 15px rgba(112, 0, 255, 0.4);
            transform: translateY(-3px);
        }

        @media (max-width: 768px) {
            .video-js { height: 230px; }
            .t-name { font-size: 0.9rem; }
            .t-img { width: 35px; height: 35px; }
            .q-btns-row { grid-template-columns: repeat(2, 1fr); }
            .match-display { padding: 10px; gap: 10px; }
        }
    </style>
</head>
<body>

    <nav class="header-abood">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="logo-text">عبود لايف</div>
            <div class="live-counter">
                <i class="fas fa-signal"></i>
                <span id="v-num">200.388</span> ألف مشاهد
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="match-display">
            <div class="t-side t-right">
                <h2 class="t-name">ريال مدريد</h2>
                <img src="https://logodownload.org/wp-content/uploads/2016/03/real-madrid-logo-1.png" class="t-img" alt="logo1">
            </div>

            <div class="vs-neon">VS</div>

            <div class="t-side t-left">
                <img src="https://logodownload.org/wp-content/uploads/2014/10/fc-barcelona-logo-0.png" class="t-img" alt="logo2">
                <h2 class="t-name">برشلونة</h2>
            </div>
        </div>

        <div class="player-wrap">
            <video id="vid" class="video-js vjs-big-play-centered" controls preload="auto">
                <source src="http://wjk30.tutor3.site/live/906544_.m3u8?session=Fsfuteq0yrUbEy-g_gNALVHW06VoIZ4TkpWPhrWff6ULy1a48_1H9OJMRQShLLbipEe2pb2bIZR3cr8V5G7GlxUT9URC7or1&location=local" type="application/x-mpegURL">
            </video>
        </div>

        <div class="q-btns-row">
            <button class="q-button" onclick="changeS('رابط_8K', this)">8K ألترا</button>
            <button class="q-button" onclick="changeS('رابط_4K', this)">4K UHD</button>
            <button class="q-button active" onclick="changeS('رابط_HD', this)">FHD 1080p</button>
            <button class="q-button" onclick="changeS('رابط_SD', this)">SD 480p</button>
        </div>

        <div class="text-center mt-5">
            <p style="color: #444; font-size: 0.8rem;">بواسطة عبود - بث مباشر حصري &copy; 2026</p>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
    <script>
        var player = videojs('vid');

        // وظيفة تغيير الجودة
        function changeS(url, btn) {
            // استبدل الروابط هنا بروابطك الفعلية لاحقاً
            // player.src({ src: url, type: 'application/x-mpegURL' });
            // player.play();
            
            document.querySelectorAll('.q-button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // كود العداد العشوائي القوي (الذي طلبته)
        function startLiveCounter() {
            let baseNum = 200; // الرقم الأساسي (200 ألف)
            
            setInterval(() => {
                // توليد 3 أرقام عشوائية بعد الفاصلة
                let randomDec = Math.floor(Math.random() * 900) + 100;
                
                // تغيير الرقم الأساسي بشكل طفيف (بين 200 و 210) ليكون واقعي
                let randomBase = Math.floor(Math.random() * (210 - 200 + 1)) + 200;
                
                // دمج الرقمين ليظهر بالشكل: 200.388
                let finalNum = randomBase + "." + randomDec;
                
                document.getElementById('v-num').innerText = finalNum;
            }, 2000); // يتغير كل ثانيتين
        }

        startLiveCounter();
    </script>
</body>
</html>
