    <div id="force-browser-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; text-align:center; padding-top:100px;">
        <div style="background:#1e1e1e; width:80%; margin:0 auto; padding:30px; border-radius:15px; border:2px solid #00ff00;">
            <h2 style="color:#00ff00;">⚠️ عذراً، البث غير مدعوم هنا</h2>
            <p style="font-size:18px; line-height:1.6;">لضمان تشغيل البث بدون تقطيع وبجودة عالية، يرجى فتح الرابط في متصفح <b>Google Chrome</b></p>
            <div style="margin:20px 0;">
                <p style="color:#aaa;">اضغط على النقاط الثلاث في الأعلى (⋮)<br>ثم اختر <b>"الفتح في المتصفح"</b></p>
            </div>
            <button onclick="copyLink()" style="background:#00ff00; color:#000; border:none; padding:12px 25px; border-radius:8px; font-weight:bold; cursor:pointer;">نسخ رابط البث</button>
        </div>
    </div>

    <script>
        // دالة فحص المتصفح الداخلي
        function checkInAppBrowser() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            var isInApp = (ua.indexOf("Telegram") > -1) || (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1) || (ua.indexOf("Instagram") > -1) || (ua.indexOf("Messenger") > -1);
            
            if (isInApp) {
                // إظهار واجهة الحجب وإيقاف تشغيل الفيديو خلفها
                document.getElementById('force-browser-overlay').style.display = 'block';
                var videoElement = document.getElementById('my-video');
                if (videoElement) { videoElement.style.display = 'none'; }
            }
        }

        // دالة نسخ الرابط لتسهيل الأمر على المستخدم
        function copyLink() {
            var dummy = document.createElement('input'),
            text = window.location.href;
            document.body.appendChild(dummy);
            dummy.value = text;
            dummy.select();
            document.execCommand('copy');
            document.body.removeChild(dummy);
            alert('تم نسخ الرابط! قم بلصقه في متصفح كروم.');
        }

        // دالة تحديث عداد المشاهدات الأصلية الخاصة بك
        function updateViewers() {
            const countElement = document.getElementById('count');
            let min = 200000;
            let max = 250000;
            let currentCount = Math.floor(Math.random() * (max - min + 1)) + min;
            countElement.innerText = currentCount.toLocaleString('en-US');
        }

        // تشغيل الوظائف عند التحميل
        window.onload = function() {
            checkInAppBrowser();
            setInterval(updateViewers, 5000);
            updateViewers();
        };
    </script>
