<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة عبود Premium - البث المباشر للأبطال</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* كود الخلفية المتحركة الذي أرسلته */
        :root {
            --main-gradient: linear-gradient(120deg, #002bff, #00c3ff, #7f00ff, #00bfff);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --neon-accent: #00f2ff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; min-height: 100vh;
            font-family: 'Cairo', sans-serif;
            background: var(--main-gradient);
            background-size: 400% 400%;
            animation: bgMove 10s ease infinite;
            color: white;
            display: flex; flex-direction: column; align-items: center;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* حاوية التصميم "النازكة" المحسنة */
        .wrapper {
            width: 95%; max-width: 850px;
            margin-top: 20px;
            margin-bottom: 50px;
        }

        /* لوحة المباراة - تصميم أفقي فائق الأناقة (صغيرة) */
        .match-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 15px 30px;
            display: flex; align-items: center; justify-content: center;
            gap: 25px; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .team { display: flex; align-items: center; gap: 10px; flex: 1; }
        .team.t-right { justify-content: flex-end; }
        .team.t-left { justify-content: flex-start; }

        .team-logo {
            width: 45px; height: 45px; object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }
        .team-name { font-size: 1rem; font-weight: 700; margin: 0; white-space: nowrap; }
        
        .vs-neon {
            background: white; color: #002bff;
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 0.9rem;
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
        }

        /* منطقة المشغل بلمسة Glow */
        .player-glow-box {
            background: #000;
            border-radius: 25px;
            padding: 5px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 40px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
        }
        .video-js { width: 100%; height: 480px; border-radius: 20px; }

        /* أزرار الجودة (تنسيق بلوري) - مرتبطة بالرابط */
        .quality-row {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 12px; margin-top: 20px;
        }
        .quality-card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px; border-radius: 12px;
            font-weight: bold; text-align: center;
            cursor: pointer; transition: 0.4s; font-size: 0.85rem;
        }
        .quality-card:hover, .quality-card.active {
            background: white; color: #002bff;
            transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        /* عداد المشاهدات المطلوب بصيغة عبود */
        .viewers-panel {
            margin-top: 20px; text-align: center;
            background: rgba(0,0,0,0.2);
            padding: 8px 20px; border-radius: 50px;
            display: inline-block; width: auto; align-self: center;
            font-size: 0.95rem; border: 1px solid rgba(255,255,255,0.1);
        }
        #v-num { font-weight: 900; color: #00f2ff; text-shadow: 0 0 5px #00f2ff; }

        @media (max-width: 768px) {
            .video-js { height: 240px; }
            .team-name { font-size: 0.8rem; }
            .team-logo { width: 35px; height: 35px; }
            .quality-row { grid-template-columns: repeat(2, 1fr); }
            .match-card { padding: 10px 15px; gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="text-center mb-3">
            <h1 style="font-weight:900; font-size:2rem;">عبود <span style="font-weight:400; opacity:0.8; color: #00f2ff;">Premium</span></h1>
        </div>

        <div class="match-card">
            <div class="team t-right">
                <h2 class="team-name">ريال مدريد</h2>
                <img src="https://logodownload.org/wp-content/uploads/2016/03/real-madrid-logo-1.png" class="team-logo" alt="logo1">
            </div>

            <div class="vs-neon">VS</div>

            <div class="team t-left">
                <img src="https://logodownload.org/wp-content/uploads/2014/10/fc-barcelona-logo-0.png" class="team-logo" alt="logo2">
                <h2 class="team-name">برشلونة</h2>
            </div>
        </div>

        <div class="player-glow-box">
            <video id="abood-player" class="video-js vjs-big-play-centered" controls preload="auto" autoplay muted>
                <source src="http://wjk30.tutor3.site/live/906544_.m3u8?session=Fsfuteq0yrUbEy-g_gNALVHW06VoIZ4TkpWPhrWff6ULy1a48_1H9OJMRQShLLbipEe2pb2bIZR3cr8V5G7GlxUT9URC7or1&location=local" type="application/x-mpegURL">
            </video>
        </div>

        <div class="quality-row">
            <div class="quality-card" onclick="setQ('http://wjk30.tutor3.site/live/906544_.m3u8?session=Fsfuteq0yrUbEy-g_gNALVHW06VoIZ4TkpWPhrWff6ULy1a48_1H9OJMRQShLLbipEe2pb2bIZR3cr8V5G7GlxUT9URC7or1&location=local', this)">جودة 8K</div>
            <div class="quality-card" onclick="setQ('http://wjk30.tutor3.site/live/906544_.m3u8?session=Fsfuteq0yrUbEy-g_gNALVHW06VoIZ4TkpWPhrWff6ULy1a48_1H9OJMRQShLLbipEe2pb2bIZR3cr8V5G7GlxUT9URC7or1&location=local', this)">جودة 4K</div>
            <div class="quality-card active" onclick="setQ('http://wjk30.tutor3.site/live/906544_.m3u8?session=Fsfuteq0yrUbEy-g_gNALVHW06VoIZ4TkpWPhrWff6ULy1a48_1H9OJMRQShLLbipEe2pb2bIZR3cr8V5G7GlxUT9URC7or1&location=local', this)">جودة HD</div>
            <div class="quality-card" onclick="setQ('http://wjk30.tutor3.site/live/906544_.m3u8?session=Fsfuteq0yrUbEy-g_gNALVHW06VoIZ4TkpWPhrWff6ULy1a48_1H9OJMRQShLLbipEe2pb2bIZR3cr8V5G7GlxUT9URC7or1&location=local', this)">جودة SD</div>
        </div>

        <div class="d-flex justify-content-center">
            <div class="viewers-panel">
                <i class="fas fa-signal me-2"></i> يتواجد الآن: <span id="v-num">200.388</span> ألف مشاهد
            </div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
    <script>
        // تعريف المشغل مع Autoplay Muted
        var player = videojs('abood-player', {
            autoplay: 'any', // يحاول التشغيل بأي وسيلة (تلقائي صامت)
            muted: true      // ضروري لضمان عمل التشغيل التلقائي في المتصفحات
        });

        // وظيفة تغيير الجودة (فعالة جداً وفورية)
        function setQ(url, el) {
            player.src({ src: url, type: 'application/x-mpegURL' });
            player.play();
            document.querySelectorAll('.quality-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            console.log("تم تحويل البث إلى: " + url);
        }

        // عداد المشاهدات (صيغة عبود العشوائية القوية)
        function startCounter() {
            setInterval(() => {
                let main = Math.floor(Math.random() * (225 - 198 + 1)) + 198; // رقم بين 198 و 225
                let sub = Math.floor(Math.random() * 900) + 100; // 3 أرقام بعد الفاصلة
                document.getElementById('v-num').innerText = main + "." + sub;
            }, 2000); // يتغير كل ثانيتين
        }
        startCounter();
    </script>
</body>
</html>
