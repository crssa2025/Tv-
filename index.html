<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة عبود لايف | البث الذكي</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* كود الخلفية المتحركة الخاص بك */
        :root {
            --main-gradient: linear-gradient(120deg, #002bff, #00c3ff, #7f00ff, #00bfff);
            --glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            font-family: 'Cairo', sans-serif;
            background: var(--main-gradient);
            background-size: 400% 400%;
            animation: bgMove 10s ease infinite;
            color: white; display: flex; justify-content: center;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container-box {
            width: 95%; max-width: 850px; margin-top: 20px;
        }

        /* لوحة المباراة النازكة */
        .match-header {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 15px;
            display: flex; align-items: center; justify-content: space-around;
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
        }
        .team { display: flex; align-items: center; gap: 10px; }
        .team img { width: 45px; height: 45px; object-fit: contain; }
        .team-name { font-size: 1rem; font-weight: 700; margin: 0; }
        .vs { font-weight: 900; color: #fff; background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 50px; font-size: 0.8rem; }

        /* المشغل */
        .video-wrap {
            border-radius: 25px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            background: #000;
        }
        .video-js { width: 100%; height: 480px; }

        /* أزرار الجودة */
        .q-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 10px; margin-top: 15px;
        }
        .btn-quality {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 12px; border-radius: 12px;
            font-weight: bold; transition: 0.3s; cursor: pointer;
            font-size: 0.85rem;
        }
        .btn-quality:hover, .btn-quality.active {
            background: #fff; color: #002bff; transform: translateY(-3px);
        }

        /* العداد */
        .v-info {
            text-align: center; margin-top: 20px;
            background: rgba(0,0,0,0.2); padding: 5px 20px;
            border-radius: 50px; display: inline-block;
            font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.1);
        }

        @media (max-width: 768px) {
            .video-js { height: 240px; }
            .q-grid { grid-template-columns: repeat(2, 1fr); }
            .team-name { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="container-box">
        <h2 class="text-center mb-3" style="font-weight: 900;">عبود <span style="color: #00f2ff;">LIVE</span></h2>

        <div class="match-header">
            <div class="team">
                <h2 class="team-name">ريال مدريد</h2>
                <img src="https://logodownload.org/wp-content/uploads/2016/03/real-madrid-logo-1.png" alt="t1">
            </div>
            <div class="vs">VS</div>
            <div class="team">
                <img src="https://logodownload.org/wp-content/uploads/2014/10/fc-barcelona-logo-0.png" alt="t2">
                <h2 class="team-name">برشلونة</h2>
            </div>
        </div>

        <div class="video-wrap">
            <video id="main-player" class="video-js vjs-big-play-centered" controls autoplay muted preload="auto">
                <source src="http://wjk30.tutor3.site/live/906544_.m3u8?session=Fsfuteq0yrUbEy-g_gNALVHW06VoIZ4TkpWPhrWff6ULy1a48_1H9OJMRQShLLbipEe2pb2bIZR3cr8V5G7GlxUT9URC7or1&location=local" type="application/x-mpegURL">
            </video>
        </div>

        <div class="q-grid">
            <button class="btn-quality" onclick="switchStream('http://wjk30.tutor3.site/live/906544_.m3u8?1', this)">8K Ultra</button>
            <button class="btn-quality" onclick="switchStream('http://wjk30.tutor3.site/live/906544_.m3u8?2', this)">4K UHD</button>
            <button class="btn-quality active" onclick="switchStream('http://wjk30.tutor3.site/live/906544_.m3u8?3', this)">HD 1080p</button>
            <button class="btn-quality" onclick="switchStream('http://wjk30.tutor3.site/live/906544_.m3u8?4', this)">SD 480p</button>
        </div>

        <div class="w-100 text-center">
            <div class="v-info">
                <i class="fas fa-eye me-2"></i> الآن: <span id="v-count" style="font-weight: 900; color: #00f2ff;">200.388</span> ألف مشاهد
            </div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
    <script>
        // تعريف المشغل
        var player = videojs('main-player', {
            autoplay: 'any', // يحاول التشغيل التلقائي بأي وسيلة
            muted: true      // ضروري جداً لضمان عمل التشغيل التلقائي
        });

        // وظيفة تبديل الجودة الفورية
        function switchStream(url, btn) {
            // تخزين الوقت الحالي للبث عشان ما يرجع من البداية
            var currentTime = player.currentTime();
            
            player.src({ src: url, type: 'application/x-mpegURL' });
            
            player.ready(function() {
                player.currentTime(currentTime); // يكمل من نفس اللحظة
                player.play(); // تشغيل فوري
            });

            // تحديث شكل الأزرار
            document.querySelectorAll('.btn-quality').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // عداد المشاهدات العشوائي بصيغة عبود
        function updateViews() {
            setInterval(() => {
                let base = Math.floor(Math.random() * (225 - 198 + 1)) + 198;
                let dec = Math.floor(Math.random() * 900) + 100;
                document.getElementById('v-count').innerText = base + "." + dec;
            }, 2500);
        }
        updateViews();
    </script>
</body>
</html>
