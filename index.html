<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>البث المباشر</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; /* خلفية سوداء بالكامل */
            color: white; font-family: sans-serif;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* حاوية الفيديو لتأخذ المساحة المتاحة */
        .video-wrapper {
            flex: 1; /* يأخذ باقي مساحة الصفحة */
            position: relative;
            background-color: #000;
        }

        .video-js {
            width: 100% !important; height: 100% !important;
        }

        /* شريط المعلومات أسفل الفيديو */
        .info-bar {
            height: 60px;
            background: rgba(20, 20, 20, 0.95);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px;
            border-top: 1px solid #333;
        }

        .user-name { font-size: 16px; font-weight: bold; color: #fff; }
        
        .live-status {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255, 0, 0, 0.1);
            padding: 5px 10px; border-radius: 20px;
            border: 1px solid rgba(255,0,0,0.3);
        }

        .red-dot {
            width: 10px; height: 10px; background-color: #ff0000;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .viewer-count { font-size: 14px; color: #eee; font-weight: bold; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" playsinline>
            <source src="https://min2-36.godady.it.com/live/35767_.m3u8?session=1gk-8YnO6CrM1meB8arvptdMvT1FGJMQ7HMd3O1hGU7-QgicHpxAXZtxAZKu4Y1jtQbMRxLUSh3RTrYiFcPbTetpoyJ2K3Dc&location=local" type="application/x-mpegURL">
        </video>
    </div>

    <div class="info-bar">
        <div class="user-name">بث بواسطة: [ضع اسمك هنا]</div>
        
        <div class="live-status">
            <div class="red-dot"></div>
            <div class="viewer-count" id="count">220,000 مشاهد</div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        // سكربت عداد المشاهدين الوهمي
        function updateViewers() {
            const min = 220000;
            const max = 240000;
            // توليد رقم عشوائي بين الرقمين
            const count = Math.floor(Math.random() * (max - min + 1)) + min;
            // تنسيق الرقم بفاصلة (مثال: 230,500)
            const formattedCount = count.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            document.getElementById('count').innerText = formattedCount + " مشاهد";
        }

        // تحديث الرقم كل 5 ثواني
        setInterval(updateViewers, 5000);
        updateViewers(); // تحديث أولي عند التحميل
    </script>
</body>
</html>
