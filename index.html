<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بث عبود الرسمي</title>
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1/dist/fantasy/index.css" rel="stylesheet">

    <style>
        :root {
            --neon-cyan: #00d2ff;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #02060c; color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow-x: hidden;
        }

        #stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: radial-gradient(circle, #0a1931, #02060c);
        }

        .top-nav {
            padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.2); backdrop-filter: blur(10px);
        }
        .brand { font-size: 16px; font-weight: 300; color: #eee; }
        .brand b { color: var(--neon-cyan); font-weight: 800; margin-right: 5px; }

        .container { width: 95%; max-width: 1000px; margin: 15px auto; }

        .match-title { text-align: center; margin-bottom: 15px; }
        .match-title h2 { margin: 0; font-size: 20px; font-weight: 900; }
        .match-title p { margin: 5px 0; font-size: 11px; color: var(--neon-cyan); opacity: 0.8; }

        .video-box {
            width: 100%;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .video-js {
            width: 100% !important;
            height: auto !important;
            aspect-ratio: 16 / 9 !important; 
        }

        .stats-footer {
            margin-top: 15px;
            display: flex; flex-direction: column; gap: 10px;
        }

        .viewers-pill {
            background: var(--glass);
            border: 1px solid rgba(0, 210, 255, 0.2);
            padding: 12px; border-radius: 15px;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        .v-count { font-size: 22px; font-weight: 900; color: #fff; }
        .v-label { font-size: 12px; color: var(--neon-cyan); font-weight: bold; }

        .dot { width: 8px; height: 8px; background: #00ffcc; border-radius: 50%; box-shadow: 0 0 8px #00ffcc; }

        .info-cards {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        .card {
            background: var(--glass); padding: 12px; border-radius: 15px;
            text-align: center; border: 1px solid rgba(255,255,255,0.05);
        }
        .card span { display: block; font-size: 10px; color: #888; }
        .card b { font-size: 13px; color: #ddd; }
    </style>
</head>
<body>

    <canvas id="stars"></canvas>

    <nav class="top-nav">
        <div class="brand">بواسطة <b>عبود</b></div>
        <div style="font-size: 10px; color: #00ffcc;">● مباشر HD</div>
    </nav>

    <div class="container">
        <div class="match-title">
            <h2>العراق 🇮🇶 ضد بوليفيا 🇧🇴</h2>
            <p>بث مباشر - تصفيات الملحق العالمي</p>
        </div>

        <div class="video-box">
            <video id="abboud-stream" class="video-js vjs-theme-fantasy vjs-big-play-centered" controls preload="auto" playsinline>
                <source src="https://min2-36.godady.it.com/live/35767_.m3u8?session=1gk-8YnO6CrM1meB8arvptdMvT1FGJMQ7HMd3O1hGU7-QgicHpxAXZtxAZKu4Y1jtQbMRxLUSh3RTrYiFcPbTetpoyJ2K3Dc&location=local" type="application/x-mpegURL">
            </video>
        </div>

        <div class="stats-footer">
            <div class="viewers-pill">
                <div class="dot"></div>
                <span class="v-count" id="live-v">220.123</span>
                <span class="v-label">ألف مشاهد الآن</span>
            </div>

            <div class="info-cards">
                <div class="card">
                    <span>المعلق</span>
                    <b>علي سعيد الكعبي</b>
                </div>
                <div class="card">
                    <span>الجودة</span>
                    <b>1080p 60fps</b>
                </div>
            </div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        // محرك النجوم
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let starArray = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            starArray = [];
            for(let i=0; i<150; i++) {
                starArray.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*1.5, o:Math.random()});
            }
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle="white";
            starArray.forEach(s => {
                ctx.globalAlpha = s.o; ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
                s.y += 0.3; if(s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(animate);
        }
        init(); animate();

        // إعداد المشغل مع خاصية تشغيل الصوت عند النقر
        var player = videojs('abboud-stream', { 
            fluid: true
        });

        // هذا الجزء هو المسؤول عن تشغيل الصوت والفيديو معاً عند ضغط زر Play
        player.on('play', function() {
            player.muted(false);
        });

        // العداد
        let viewers = 220.123;
        setInterval(() => {
            viewers += (Math.random() * 0.100) - 0.040;
            document.getElementById('live-v').innerText = viewers.toFixed(3);
        }, 3000);
    </script>
</body>
</html>
