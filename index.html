<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث عبود Premium | مباشر الآن</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --main-gradient: linear-gradient(120deg, #002bff, #00c3ff, #7f00ff, #00bfff);
            --glass: rgba(255, 255, 255, 0.12);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            font-family: 'Cairo', sans-serif;
            background: var(--main-gradient);
            background-size: 400% 400%;
            animation: bgMove 10s ease infinite;
            color: white; display: flex; justify-content: center;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-container { width: 95%; max-width: 850px; margin-top: 25px; }

        /* لوحة المباراة */
        .match-box {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px; padding: 15px;
            display: flex; align-items: center; justify-content: space-around;
            margin-bottom: 20px;
        }
        .team-info { display: flex; align-items: center; gap: 10px; }
        .team-logo { width: 45px; height: 45px; object-fit: contain; }
        .team-name { font-size: 1rem; font-weight: 700; margin: 0; }
        .vs-tag { background: #fff; color: #002bff; padding: 4px 12px; border-radius: 50px; font-weight: 900; font-size: 0.8rem; }

        /* المشغل الاحترافي */
        .video-container {
            position: relative; border-radius: 25px; overflow: hidden;
            background: #000; border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        video { width: 100%; display: block; height: 480px; background: #000; }

        /* أزرار الجودة */
        .q-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .q-btn {
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 12px; border-radius: 12px; font-weight: bold;
            transition: 0.3s; cursor: pointer; font-size: 0.85rem; text-align: center;
        }
        .q-btn:hover, .q-btn.active { background: #fff; color: #002bff; transform: translateY(-3px); }

        /* عداد المشاهدات */
        .v-box {
            text-align: center; margin-top: 20px;
            background: rgba(0,0,0,0.2); padding: 6px 20px;
            border-radius: 50px; display: inline-block; font-size: 0.9rem;
        }

        @media (max-width: 768px) { video { height: 230px; } .q-row { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <div class="main-container">
        <h2 class="text-center mb-4" style="font-weight: 900;">عبود <span style="color: #00f2ff;">Premium</span></h2>

        <div class="match-box">
            <div class="team-info">
                <h2 class="team-name">ريال مدريد</h2>
                <img src="https://logodownload.org/wp-content/uploads/2016/03/real-madrid-logo-1.png" class="team-logo">
            </div>
            <div class="vs-tag">VS</div>
            <div class="team-info">
                <img src="https://logodownload.org/wp-content/uploads/2014/10/fc-barcelona-logo-0.png" class="team-logo">
                <h2 class="team-name">برشلونة</h2>
            </div>
        </div>

        <div class="video-container">
            <video id="video" controls autoplay playsinline muted></video>
        </div>

        <div class="q-row">
            <div class="q-btn" onclick="loadStream(activeUrl, this)">جودة 8K</div>
            <div class="q-btn" onclick="loadStream(activeUrl, this)">جودة 4K</div>
            <div class="q-btn active" onclick="loadStream(activeUrl, this)">جودة HD</div>
            <div class="q-btn" onclick="loadStream(activeUrl, this)">جودة SD</div>
        </div>

        <div class="text-center w-100">
            <div class="v-box">
                <i class="fas fa-users me-2"></i> الآن: <span id="v-num" style="font-weight: 900; color: #00f2ff;">200.388</span> ألف مشاهد
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const video = document.getElementById('video');
        // الرابط الجديد الخاص بك
        const activeUrl = "http://wjk30.tutor3.site/live/906544_.m3u8?session=Fsfuteq0yrUbEy-g_gNALVHW06VoIZ4TkpWPhrWff6ULy1a48_1H9OJMRQShLLbipEe2pb2bIZR3cr8V5G7GlxUT9URC7or1&location=local";

        function loadStream(url, btn) {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }

            if(btn) {
                document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
        }

        // تشغيل تلقائي عند فتح الصفحة
        loadStream(activeUrl);

        // عداد المشاهدات
        setInterval(() => {
            let main = Math.floor(Math.random() * (228 - 200 + 1)) + 200;
            let sub = Math.floor(Math.random() * 900) + 100;
            document.getElementById('v-num').innerText = main + "." + sub;
        }, 2500);
    </script>
</body>
</html>
