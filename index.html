<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث مباشر | العراق ضد بوليفيا</title>
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #ff3e3e;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0a 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* واجهة الحجب الذكية بتصميم فخم */
        #force-browser-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .overlay-card {
            background: var(--glass);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            max-width: 400px;
            width: 85%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .header {
            width: 100%;
            padding: 30px 0;
            text-align: center;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(0,255,136,0.3);
            margin-bottom: 20px;
        }

        .live-badge {
            background: var(--secondary);
            padding: 4px 15px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
            display: inline-block;
            margin-bottom: 15px;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 62, 62, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255, 62, 62, 0); }
            100% { transform: scale(1); }
        }

        .container {
            width: 95%;
            max-width: 950px;
            z-index: 1;
        }

        .video-container {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.15);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .video-js { width: 100%; height: 500px; }

        .stats-bar {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(5px);
            padding: 20px;
            border-radius: 0 0 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .viewers-count {
            color: var(--primary);
            font-size: 1.3rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chrome-btn {
            background: linear-gradient(90deg, #4285F4, #34A853, #FBBC05, #EA4335);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .chrome-btn:hover { transform: translateY(-3px); }

        @media (max-width: 600px) {
            .video-js { height: 260px; }
            .stats-bar { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

    <div id="force-browser-overlay">
        <div class="overlay-card">
            <img src="https://www.google.com/chrome/static/images/chrome-logo.svg" width="60" style="margin-bottom:15px;">
            <h2 style="margin:10px 0;">افتح في جوجل كروم</h2>
            <p style="color:#ccc; font-size:15px;">للاستمتاع ببث مستقر وبدون تقطيع، يرجى الانتقال إلى المتصفح الرسمي.</p>
            
            <button class="chrome-btn" onclick="openInChrome()">تشغيل في Google Chrome</button>
            
            <p style="font-size:12px; color:#888; margin-top:15px;">
                أو اضغط على (⋮) بالأعلى ثم اختر "الفتح في المتصفح"
            </p>
        </div>
    </div>

    <div class="header">
        <div class="live-badge">🔴 مباشر الآن</div>
        <h1 style="margin:0; letter-spacing: 1px;">🇮🇶 العراق <span style="color:var(--primary)">VS</span> بوليفيا 🇧🇴</h1>
    </div>

    <div class="container">
        <div class="video-container">
            <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" playsinline
                data-setup='{"fluid": true}'>
                <source src="https://crssa2025.github.io/Tv-/" type="application/x-mpegURL">
            </video>
        </div>

        <div class="stats-bar">
            <div style="color:#aaa">الدقة: <span style="color:white">1080p Ultra HD</span></div>
            <div class="viewers-count">
                <span style="font-size:20px;">👁️</span>
                <span id="count">220,000</span>
                <span style="font-size:14px; font-weight:normal; color:#aaa;">مشاهد</span>
            </div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>

    <script>
        // 1. كشف التلجرام والتطبيقات وإظهار واجهة الحجب
        function initCheck() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            var isApp = (ua.indexOf("Telegram") > -1) || (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1) || (ua.indexOf("Instagram") > -1);
            
            if (isApp) {
                document.getElementById('force-browser-overlay').style.display = 'flex';
            }
        }

        // 2. دالة الزر للفتح في كروم (تحاول فتح الرابط ببروتوكول جوجل)
        function openInChrome() {
            var currentUrl = window.location.href;
            // محاولة توجيه أندرويد لفتح كروم مباشرة
            var chromeIntent = "intent://" + currentUrl.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
            
            window.location.href = chromeIntent;
            
            // احتياطاً لو لم يفتح، يظهر تنبيه للمستخدم
            setTimeout(function() {
                alert("إذا لم يفتح كروم تلقائياً، يرجى الضغط على النقاط الثلاث بالأعلى واختيار 'الفتح في المتصفح'");
            }, 2000);
        }

        // 3. عداد المشاهدات الوهمي المطور
        function updateViewers() {
            const countElement = document.getElementById('count');
            let min = 220000;
            let max = 245000;
            let current = Math.floor(Math.random() * (max - min + 1)) + min;
            countElement.innerText = current.toLocaleString('en-US');
        }

        window.onload = function() {
            initCheck();
            setInterval(updateViewers, 4000);
            updateViewers();
        };
    </script>
</body>
</html>
