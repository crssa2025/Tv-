<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>البث المباشر | عبود</title>
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1/dist/fantasy/index.css" rel="stylesheet">

    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --live-red: #ff0055;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #050505;
            color: white; font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* الخلفية الديناميكية الحركية */
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #050505, #0a1a3a, #050505);
            z-index: -1;
        }
        .circles {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden;
        }
        .circles li {
            position: absolute; display: block; list-style: none;
            width: 20px; height: 20px; background: rgba(0, 210, 255, 0.1);
            animation: animate 25s linear infinite; bottom: -150px;
        }
        @keyframes animate {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
        }
        /* توزيع الجزيئات */
        .circles li:nth-child(1){ left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .circles li:nth-child(2){ left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .circles li:nth-child(3){ left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .circles li:nth-child(4){ left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }

        /* رأس الصفحة */
        .header {
            padding: 20px; text-align: center;
            background: var(--glass); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .live-box {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--live-red); padding: 5px 15px;
            border-radius: 50px; font-weight: bold; font-size: 14px;
            box-shadow: 0 0 15px var(--live-red);
        }

        .match-card {
            margin: 15px 0; font-size: 22px; font-weight: 900;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* حاوية الفيديو */
        .player-container {
            width: 95%; max-width: 950px; margin: 20px auto;
            position: relative; border-radius: 20px;
            padding: 5px; background: linear-gradient(var(--neon-blue), var(--neon-purple));
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
        }

        .video-js {
            width: 100% !important; height: auto; aspect-ratio: 16/9;
            border-radius: 18px !important;
        }

        /* بار الإحصائيات الفخم */
        .stats-panel {
            width: 95%; max-width: 950px; margin: 10px auto;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: var(--glass);
            backdrop-filter: blur(10px); border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .viewers-badge {
            display: flex; align-items: center; gap: 10px;
            font-size: 18px; font-weight: bold; color: #00ffcc;
        }

        .viewers-badge span { color: #fff; }

        .owner-info {
            font-size: 14px; font-weight: bold;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        @keyframes pulse-eye {
            0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; }
        }
        .eye-icon { animation: pulse-eye 2s infinite; }
    </style>
</head>
<body>

    <div class="bg-animate">
        <ul class="circles">
            <li></li><li></li><li></li><li></li><li></li><li></li>
        </ul>
    </div>

    <div class="header">
        <div class="live-box">🔴 مباشر الآن</div>
        <div class="match-card">العراق 🇮🇶 ضد بوليفيا 🇧🇴</div>
        <div style="color: var(--neon-blue); font-size: 13px;">بث فائق الجودة 4K | تعليق عربي</div>
    </div>

    <div class="player-container">
        <video id="abboud-stream" class="video-js vjs-theme-fantasy" controls preload="auto" playsinline poster="https://th.bing.com/th/id/OIG.YourImageHere">
            <source src="https://min2-36.godady.it.com/live/35767_.m3u8?session=1gk-8YnO6CrM1meB8arvptdMvT1FGJMQ7HMd3O1hGU7-QgicHpxAXZtxAZKu4Y1jtQbMRxLUSh3RTrYiFcPbTetpoyJ2K3Dc&location=local" type="application/x-mpegURL">
        </video>
    </div>

    <div class="stats-panel">
        <div class="viewers-badge">
            <span class="eye-icon">👁️</span>
            <span id="v-count">220.123</span> <span>ألف مشاهد</span>
        </div>
        <div class="owner-info">بواسطة: عبود</div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>

    <script>
        // إعداد المشغل
        var player = videojs('abboud-stream', {
            fluid: true,
            playbackRates: [0.5, 1, 1.5, 2],
            controlBar: {
                skipButtons: { forward: 10, backward: 10 }
            }
        });

        // عداد المشاهدين الديناميكي (ألف)
        let viewers = 220.123;
        function updateViewers() {
            // إضافة أو طرح جزء بسيط جداً من الألف
            let change = (Math.random() * 0.150) - 0.070;
            viewers += change;
            
            // التأكد من بقاء الرقم جميل (3 مراتب بعد الفاصلة)
            document.getElementById('v-count').innerText = viewers.toFixed(3);
        }
        
        setInterval(updateViewers, 2500);
    </script>
</body>
</html>
