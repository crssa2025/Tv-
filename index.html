<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث مباشر | العراق ضد بوليفيا</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            padding: 15px;
            background: #151515;
            text-align: center;
            border-bottom: 3px solid #e91e63;
        }

        .live-tag {
            background-color: #ff0000;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .container {
            width: 95%;
            max-width: 950px;
            margin-top: 25px;
        }

        .video-box {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            aspect-ratio: 16 / 9;
        }

        video {
            width: 100%;
            height: 100%;
            outline: none;
        }

        .stats-footer {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 0 0 8px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
        }

        .viewer-count {
            color: #4caf50;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .server-status {
            font-size: 0.9rem;
            color: #bbb;
        }
    </style>
</head>
<body>

    <div class="header">
        <span class="live-tag">مباشر LIVE</span>
        <h2 style="margin: 10px 0;">🇮🇶 العراق vs بوليفيا 🇧🇴</h2>
    </div>

    <div class="container">
        <div class="video-box">
            <video id="video" controls autoplay playsinline></video>
        </div>

        <div class="stats-footer">
            <div class="viewer-count">
                👁️ <span id="dynamic-count">220,540</span> مشاهد الآن
            </div>
            <div class="server-status">
                حالة السيرفر: <span style="color: #00ff00;">متصل ✅</span>
            </div>
        </div>
    </div>

    <script>
        // كود تشغيل البث
        var video = document.getElementById('video');
        var videoSrc = 'http://xcmin32.acmst.it.com/live/194432_.m3u8?session=zWETTd-UxKdl8D44xQw0olB0XWYO9T7IrXiRdl9wh4okv4Ayy7j5rVSCR3vpBdd6QJ8E42Po_Cu36C90dBZK-Um36TVPvTiD&location=local';

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        }
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        }

        // كود عداد المشاهدات الوهمي المطور
        function updateCounter() {
            const countSpan = document.getElementById('dynamic-count');
            // توليد رقم عشوائي بين 215,000 و 248,000
            let randomNum = Math.floor(Math.random() * (248000 - 215000 + 1)) + 215000;
            countSpan.innerText = randomNum.toLocaleString('ar-EG'); // عرض الأرقام بتنسيق جميل
        }

        // تحديث كل 4 ثواني
        setInterval(updateCounter, 4000);
        updateCounter();
    </script>
</body>
</html>
