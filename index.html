<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبكة عبود لايف | بث الجودة الفائقة</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --abood-gold: #ffcf33;
            --abood-cyan: #00f2ff;
            --abood-purple: #8e2de2;
            --main-bg: #040609;
        }

        body {
            background-color: var(--main-bg);
            background: radial-gradient(circle at 50% 0%, #1a2236 0%, #040609 70%);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0; padding-bottom: 60px;
        }

        /* Navbar Stylish */
        .abood-navbar {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--abood-purple);
            padding: 15px 0;
            position: sticky; top: 0; z-index: 999;
        }
        .brand-name {
            font-size: 1.8rem; font-weight: 900;
            background: linear-gradient(to right, #fff, var(--abood-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Live Stats Box */
        .live-stat-box {
            background: rgba(255, 0, 60, 0.15);
            border: 1px solid #ff003c;
            padding: 5px 15px;
            border-radius: 12px;
            font-size: 0.95rem; font-weight: bold;
            display: flex; align-items: center; gap: 8px;
        }
        .view-number { color: #fff; font-family: sans-serif; }

        /* Match Panel - Horizontal Layout */
        .match-panel {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 20px 40px;
            margin: 35px 0;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .team-info { display: flex; align-items: center; gap: 15px; flex: 1; }
        .team-info.right { justify-content: flex-end; }
        .team-info.left { justify-content: flex-start; }
        
        .t-logo { width: 60px; height: 60px; object-fit: contain; }
        .t-name { font-size: 1.3rem; font-weight: 900; margin: 0; letter-spacing: 0.5px; }
        .vs-badge {
            background: linear-gradient(45deg, var(--abood-purple), var(--abood-cyan));
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; font-weight: 900; font-size: 1.2rem;
            margin: 0 30px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        /* Video Frame */
        .player-frame {
            background: #000;
            border-radius: 25px;
            padding: 8px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
            position: relative;
        }
        .video-js { width: 100%; height: 520px; border-radius: 20px; }

        /* Quality Buttons - Modern Grid */
        .quality-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px; margin-top: 30px;
        }
        .q-link-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 15px; border-radius: 15px;
            font-weight: 700; transition: all 0.4s ease;
            text-align: center; cursor: pointer; text-decoration: none;
            display: block; font-size: 1rem;
        }
        .q-link-btn:hover, .q-link-btn.active {
            background: linear-gradient(135deg, var(--abood-purple) 0%, var(--abood-cyan) 100%);
            border-color: transparent;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.3);
            color: #000;
        }

        @media (max-width: 768px) {
            .match-panel { padding: 15px; gap: 10px; margin: 20px 0; }
            .t-name { font-size: 0.9rem; }
            .t-logo { width: 40px; height: 40px; }
            .vs-badge { width: 35px; height: 35px; font-size: 0.8rem; margin: 0 10px; }
            .video-js { height: 250px; }
            .quality-container { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <nav class="abood-navbar">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="brand-name">عبود لايف</div>
            <div class="live-stat-box">
                <i class="fas fa-satellite-dish fa-spin"></i>
                <span><span id="random-v" class="view-number">201.450</span> ألف مشاهد</span>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="match-panel">
            <div class="team-info right">
                <h2 class="t-name">ريال مدريد</h2>
                <img src="https://logodownload.org/wp-content/uploads/2016/03/real-madrid-logo-1.png" class="t-logo" alt="t1">
            </div>

            <div class="vs-badge">VS</div>

            <div class="team-info left">
                <img src="https://logodownload.org/wp-content/uploads/2014/10/fc-barcelona-logo-0.png" class="t-logo" alt="t2">
                <h2 class="t-name">برشلونة</h2>
            </div>
        </div>

        <div class="player-frame">
            <video id="abood-stream" class="video-js vjs-big-play-centered" controls preload="auto">
                <source id="main-src" src="http://wjk30.tutor3.site/live/906544_.m3u8?session=Fsfuteq0yrUbEy-g_gNALVHW06VoIZ4TkpWPhrWff6ULy1a48_1H9OJMRQShLLbipEe2pb2bIZR3cr8V5G7GlxUT9URC7or1&location=local" type="application/x-mpegURL">
            </video>
        </div>

        <div class="quality-container">
            <div class="q-link-btn" onclick="playQuality('http://wjk30.tutor3.site/live/906544_.m3u8?session=Fsfuteq0yrUbEy-g_gNALVHW06VoIZ4TkpWPhrWff6ULy1a48_1H9OJMRQShLLbipEe2pb2bIZR3cr8V5G7GlxUT9URC7or1&location=local', this)">8K ULTRA</div>
            <div class="q-link-btn" onclick="playQuality('http://wjk30.tutor3.site/live/906544_.m3u8?session=Fsfuteq0yrUbEy-g_gNALVHW06VoIZ4TkpWPhrWff6ULy1a48_1H9OJMRQShLLbipEe2pb2bIZR3cr8V5G7GlxUT9URC7or1&location=local', this)">4K UHD</div>
            <div class="q-link-btn active" onclick="playQuality('http://wjk30.tutor3.site/live/906544_.m3u8?session=Fsfuteq0yrUbEy-g_gNALVHW06VoIZ4TkpWPhrWff6ULy1a48_1H9OJMRQShLLbipEe2pb2bIZR3cr8V5G7GlxUT9URC7or1&location=local', this)">FULL HD</div>
            <div class="q-link-btn" onclick="playQuality('http://wjk30.tutor3.site/live/906544_.m3u8?session=Fsfuteq0yrUbEy-g_gNALVHW06VoIZ4TkpWPhrWff6ULy1a48_1H9OJMRQShLLbipEe2pb2bIZR3cr8V5G7GlxUT9URC7or1&location=local', this)">SD 480p</div>
        </div>

        <div class="text-center mt-5">
            <p class="text-muted small">تصميم شبكة عبود لايف &copy; 2026 - جودة بلا حدود</p>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
    <script>
        var player = videojs('abood-stream');

        // وظيفة تغيير الجودة الفعالة
        function playQuality(url, element) {
            // تحديث المصدر وتشغيل الفيديو
            player.src({
                src: url,
                type: 'application/x-mpegURL'
            });
            player.play();

            // تحديث شكل الأزرار
            document.querySelectorAll('.q-link-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            
            console.log("تم تحويل البث إلى: " + url);
        }

        // عداد المشاهدات العشوائي المتطور (200.388 ألف مشاهد)
        function updateCounter() {
            let base = 200;
            let randomDec = Math.floor(Math.random() * 900) + 100; // أرقام عشوائية بعد الفاصلة
            let randomBase = Math.floor(Math.random() * (220 - 200 + 1)) + 200; // تقلب الرقم الأساسي
            
            document.getElementById('random-v').innerText = randomBase + "." + randomDec;
        }

        setInterval(updateCounter, 2500); // تحديث كل ثانيتين ونصف
        updateCounter();
    </script>
</body>
</html>
