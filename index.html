<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABOOD LIVE - بث مباشر</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
        }

        /* Header & Logo */
        .navbar {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 15px 0;
        }
        .logo-text {
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: 1px;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Match Scoreboard Area */
        .match-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
        .team-name { font-weight: 700; font-size: 1.2rem; }
        .vs-circle {
            background: var(--primary-color);
            width: 40px; height: 40px;
            display: inline-flex;
            align-items: center; justify-content: center;
            border-radius: 50%;
            font-weight: bold; font-style: italic;
            box-shadow: 0 0 15px var(--primary-color);
        }

        /* Stats & Views */
        .live-stats {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 5px 15px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            font-weight: bold;
        }
        .view-count { margin-right: 8px; color: #fff; }

        /* Video Player Styling */
        .player-wrapper {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 4px solid rgba(255,255,255,0.05);
        }
        .video-js { width: 100%; height: 550px; }

        @media (max-width: 768px) {
            .video-js { height: 250px; }
            .logo-text { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="logo-text">ABOOD <span style="color: #fff;">LIVE</span></div>
            <div class="live-stats">
                <i class="fas fa-eye me-2"></i>
                <span id="viewer-count" class="view-count">210,452</span>
                <span>مشاهد الآن</span>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="match-card mb-4 text-center">
            <div class="row align-items-center">
                <div class="col-5">
                    <i class="fas fa-shield-halved fa-3x mb-2 text-info"></i>
                    <div class="team-name">ريال مدريد</div>
                </div>
                <div class="col-2">
                    <div class="vs-circle">VS</div>
                </div>
                <div class="col-5">
                    <i class="fas fa-shield-halved fa-3x mb-2 text-danger"></i>
                    <div class="team-name">برشلونة</div>
                </div>
            </div>
        </div>

        <div class="player-wrapper">
            <video id="abood-player" class="video-js vjs-big-play-centered" controls preload="auto">
                <source src="http://wjk30.tutor3.site/live/906544_.m3u8?session=Fsfuteq0yrUbEy-g_gNALVHW06VoIZ4TkpWPhrWff6ULy1a48_1H9OJMRQShLLbipEe2pb2bIZR3cr8V5G7GlxUT9URC7or1&location=local" type="application/x-mpegURL">
            </video>
        </div>

        <div class="text-center mt-4 text-secondary">
            <p><i class="fas fa-info-circle me-1"></i> جميع الحقوق محفوظة لشبكة عبود للبث المباشر &copy; 2026</p>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
    <script>
        // كود عداد المشاهدات الوهمي
        function updateViewers() {
            const countElement = document.getElementById('viewer-count');
            // توليد رقم عشوائي بين 200000 و 250000
            let currentCount = Math.floor(Math.random() * (250000 - 200000 + 1)) + 200000;
            
            // إضافة الفواصل للرقم ليكون شكله احترافي (مثلاً 210,452)
            countElement.innerText = currentCount.toLocaleString('en-US');
        }

        // تحديث الرقم كل 5 ثوانٍ بشكل عشوائي
        setInterval(updateViewers, 5000);
        updateViewers(); // تشغيل أولي عند التحميل

        // تهيئة المشغل
        var player = videojs('abood-player', {
            fluid: true,
            playbackRates: [0.5, 1, 1.5, 2]
        });
    </script>
</body>
</html>
