<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث مباشر | العراق ضد بوليفيا</title>
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    
    <style>
        :root {
            --primary: #00ff88;
            --chrome-blue: #4285F4;
            --bg-dark: #0a0a0a;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* واجهة الحجب (تظهر افتراضياً) */
        #browser-overlay {
            display: flex; /* تظهر دائماً في البداية */
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .card {
            background: #1a1a1a;
            padding: 40px 25px;
            border-radius: 25px;
            border: 2px solid var(--primary);
            max-width: 380px;
            width: 85%;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.2);
        }

        .chrome-btn {
            background: var(--chrome-blue);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 19px;
            cursor: pointer;
            width: 100%;
            margin-top: 25px;
            display: block;
            text-decoration: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .header {
            width: 100%;
            padding: 25px 0;
            background: #151515;
            text-align: center;
            border-bottom: 2px solid var(--primary);
        }

        .live-tag {
            background: #ff0000;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0.3; } }

        .container { width: 95%; max-width: 900px; margin-top: 20px; }

        .video-js { width: 100%; height: 500px; border-radius: 15px; overflow: hidden; }

        .stats {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 0 0 15px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #333;
        }

        #count { color: var(--primary); font-weight: bold; font-size: 1.3rem; }

        @media (max-width: 600px) { .video-js { height: 260px; } .stats { flex-direction: column; gap: 15px; } }
    </style>
</head>
<body>

    <div id="browser-overlay">
        <div class="card">
            <div style="font-size: 50px; margin-bottom: 10px;">🛡️</div>
            <h2 style="margin:0; color:var(--primary);">نظام حماية البث</h2>
            <p style="color:#ccc; line-height:1.6; margin-top:15px;">
                لمشاهدة المباراة بدون انقطاع وبأعلى جودة، يجب استخدام متصفح <b>Google Chrome</b> الرسمي.
            </p>
            
            <a href="#" onclick="forceChrome()" class="chrome-btn">تشغيل عبر Google Chrome</a>
            
            <div style="margin-top:20px; color:#888; font-size:13px;">
                إذا كنت في التلغرام: اضغط (⋮) ثم <b>"فتح في المتصفح"</b>
            </div>
        </div>
    </div>

    <div class="header">
        <span class="live-tag">LIVE - مباشر</span>
        <h1 style="margin: 15px 0;">🇮🇶 العراق vs بوليفيا 🇧🇴</h1>
    </div>

    <div class="container">
        <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" data-setup='{}'>
            <source src="https://crssa2025.github.io/Tv-/" type="application/x-mpegURL">
        </video>

        <div class="stats">
            <div style="font-size:1.1rem;">الجودة: <span style="color:#00bfff;">1080p FHD</span></div>
            <div>👁️ <span id="count">220,580</span> مشاهد الآن</div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>

    <script>
        const mySite = "https://crssa2025.github.io/Tv-/";

        // 1. وظيفة التحقق الذكي لإخفاء الواجهة إذا كان المتصفح كروم
        function checkAndHide() {
            var isChrome = /Chrome/.test(navigator.userAgent) && /Google Inc/.test(navigator.vendor);
            var isEdge = /Edg/.test(navigator.userAgent); // نستثني إيدج لو أردت
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            var isApp = (ua.indexOf("Telegram") > -1) || (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1);

            // إذا كان كروم وليس داخل تطبيق تلغرام/فيسبوك
            if (isChrome && !isApp && !isEdge) {
                document.getElementById('browser-overlay').style.display = 'none';
            }
        }

        // 2. زر الإجبار على فتح كروم
        function forceChrome() {
            var intentUrl = "intent://" + mySite.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
            window.location.href = intentUrl;
            
            // للأجهزة التي لا تدعم الـ Intent (مثل آيفون)
            setTimeout(function() {
                window.location.href = mySite;
            }, 1500);
        }

        // 3. عداد المشاهدات
        function updateCounter() {
            const countEl = document.getElementById('count');
            let min = 220000; let max = 250000;
            let current = Math.floor(Math.random() * (max - min + 1)) + min;
            countEl.innerText = current.toLocaleString('en-US');
        }

        window.onload = function() {
            checkAndHide(); // التحقق فور التحميل
            setInterval(updateCounter, 4000);
            updateCounter();
        };
    </script>
</body>
</html>
